    <div class="container">

        <h2>Scrapland</h2>

        <div class="modal fade" id="wikiModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark text-light border-secondary">
                    <div class="modal-header border-secondary">

    <!-- Gallery container -->
    <div class="container">
        <h2>Galería de Scrappy</h2>
        <div class="container mt-5">
            <div class="row g-3">

                <!-- Image cards -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="modal-body d-flex justify-content-center align-items-center pt-0 gallery-item rounded overflow-hidden shadow-sm"
                        onclick="zoomImage('../src/img/scrapped/sushie.png', 'Primer sprite de Clicker - Sushi')">

                    </div>
                </div>

                <div class="col-6 col-md-4 col-lg-3">
                    <div class="modal-body d-flex justify-content-center align-items-center pt-0 gallery-item rounded overflow-hidden shadow-sm"

                    </div>
                </div>

                <div class="col-6 col-md-4 col-lg-3">
                    <div class="modal-body d-flex justify-content-center align-items-center pt-0 gallery-item rounded overflow-hidden shadow-sm"

                    </div>
                </div>

                <div class="col-6 col-md-4 col-lg-3">
                    <div class="modal-body d-flex justify-content-center align-items-center pt-0 gallery-item rounded overflow-hidden shadow-sm"

                    </div>
                </div>

                <div class="col-6 col-md-4 col-lg-3">
                    <div class="modal-body d-flex justify-content-center align-items-center pt-0 gallery-item rounded overflow-hidden shadow-sm"

                        <img src="../src/img/scrapped/chibi_test1.png" alt="Iris Chibi" class="img-fluid img-pixel">

                </div>

                <div class="col-6 col-md-4 col-lg-3">

                </div>
